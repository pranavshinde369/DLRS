name: Validate DLRS Hub

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r tools/requirements.txt
      - name: Validate repository
        run: python tools/validate_repo.py
      - name: Build registry
        run: python tools/build_registry.py
      - name: Check registry diff
        run: git diff --exit-code registry/humans.index.jsonl registry/humans.index.csv
